extraction:
  max_chunks_complex: 20
  max_chunks_moderate: 16
  max_chunks_simple: 10
  dedup_threshold: 0.85

temporal_conflict:
  max_papers: 15
  min_year_gap: 2
  # Increased to allow deeper temporal conflict analysis
  max_pairs: 25

rps:
  continuous_scoring: true
  sample_size_bonus: true
  # Safety cap for parsed/ingested sample sizes to avoid extractor hallucination
  sample_size_max: 100000

safety:
  use_flash_llm: true
