controversy:
  settled_rps_min: 0.35
  settled_applicability_min: 0.6
  settled_confidence_min: 0.7
  settled_tcs_max: 0.2
  evolving_tcs_min: 0.4
  contested_confidence_max: 0.6
  emerging_rps_max: 0.1
applicability:
  # Use a neutral fallback when metadata is missing to avoid harsh penalties
  default_fallback: 0.5
  high_match_threshold: 0.8
dempster_shafer:
  temporal_support_when_no_conflict: 0.5
  rps_support_multiplier: 0.95
  # Increase cap to ensure discounted confidences can still reach 'settled'
  max_support: 0.95
  confidence_discount: 0.1
  min_uncertainty: 0.05
