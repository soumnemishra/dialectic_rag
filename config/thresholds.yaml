# MA-RAG Comprehensive Threshold Configuration
#
# This is the centralized threshold configuration for the entire system.
# All decision thresholds in the orchestration pipeline are defined here.
#
# Override any threshold by setting MRAGE_THRESH_* environment variables:
#   MRAGE_THRESH_TCS_TRIGGER=0.12
#   MRAGE_THRESH_DS_CONFLICT_TRIGGER=0.09
#   etc.
#
# Organized into semantic groups for clarity and maintainability.

# ─────────────────────────────────────────────────────────────────────
# Temporal Conflict Scoring (TCS) – Detecting evolving evidence over time
# ─────────────────────────────────────────────────────────────────────
temporal_conflict:
  # Score above which dialectical retrieval is triggered
  tcs_trigger: 0.10

  # Maximum temporal pair comparisons per question
  tcs_max_pairs: 25

  # Minimum year gap to consider as temporal conflict
  min_year_gap: 2

  # Maximum papers to scan for temporal conflicts
  max_papers: 15

# ─────────────────────────────────────────────────────────────────────
# Conflict Detection – Dempster-Shafer and consensus thresholds
# ─────────────────────────────────────────────────────────────────────
conflict_detection:
  # DS conflict score above which dialectical retrieval is triggered
  # High values indicate direct contradiction between evidence sources
  ds_conflict_trigger: 0.08

  # DS uncertainty threshold for gating additional retrieval
  ds_uncertain_trigger: 0.15

  # Minimum step consensus (majority agreement across execution steps)
  # Below this value indicates split decision requiring dialectical synthesis
  step_consensus_min: 0.50

  # Number of distinct answer options above which conflict is detected
  conflicting_answers_threshold: 1

# ─────────────────────────────────────────────────────────────────────
# Applicability – Cohort matching and external validity
# ─────────────────────────────────────────────────────────────────────
applicability:
  # Applicability score below which dialectical retrieval is triggered
  # Low applicability means evidence is from dissimilar patient populations
  applicability_trigger: 0.50

  # Default applicability when metadata is missing to avoid harsh penalties
  default_fallback: 0.50

  # Applicability score threshold for 'high match' classification
  high_match_threshold: 0.80

# ─────────────────────────────────────────────────────────────────────
# Reproducibility Potential Score (RPS) – Study design and methodology quality
# ─────────────────────────────────────────────────────────────────────
reproducibility:
  # RPS score below which dialectical retrieval is triggered
  # Note: only triggers when controversy_label is "CONTESTED"
  rps_trigger: 0.20

  # Whether RPS trigger applies only when controversy is CONTESTED
  rps_trigger_contested: true

  # Maximum sample size cap to avoid extractor hallucination
  sample_size_max: 100000

  # Whether to use continuous RPS scoring vs. categorical
  continuous_scoring: true

# ─────────────────────────────────────────────────────────────────────
# Controversy Classification – SETTLED vs CONTESTED vs EVOLVING
# ─────────────────────────────────────────────────────────────────────
controversy:
  # SETTLED classification: well-established evidence
  #   Requirements: high RPS, high applicability, high confidence, low conflict
  settled_rps_min: 0.35
  settled_applicability_min: 0.60
  settled_confidence_min: 0.70
  settled_tcs_max: 0.20

  # CONTESTED classification: active debate in literature
  #   Requirements: moderate confidence with conflicting evidence
  contested_confidence_max: 0.60

  # EVOLVING classification: emerging evidence with temporal shifts
  evolving_rps_max: 0.10
  evolving_tcs_min: 0.40

# ─────────────────────────────────────────────────────────────────────
# Dempster-Shafer Fusion – Belief mass assignment and propagation
# ─────────────────────────────────────────────────────────────────────
dempster_shafer:
  # Support mass assigned when no temporal conflict detected
  # Used to initialize belief intervals for non-conflicting evidence
  temporal_support_when_no_conflict: 0.50

  # Multiplier applied to RPS when computing belief support
  # Scales RPS contribution to final belief mass
  rps_support_multiplier: 0.95

  # Cap on support to ensure uncertainty margin is preserved
  # Prevents over-confident assignments
  max_support: 0.95

  # Discount applied to confidence under uncertainty
  # Conservatively reduces confidence estimates when uncertainty is high
  confidence_discount: 0.10

  # Minimum uncertainty mass in belief interval
  # Ensures at least this much uncertainty margin
  min_uncertainty: 0.05

# ─────────────────────────────────────────────────────────────────────
# Document Extraction – Chunk selection and deduplication
# ─────────────────────────────────────────────────────────────────────
extraction:
  # Maximum chunks to extract for complex questions (multihop planning)
  max_chunks_complex: 20

  # Maximum chunks to extract for moderate questions
  max_chunks_moderate: 16

  # Maximum chunks to extract for simple questions (direct QA)
  max_chunks_simple: 10

  # Semantic similarity threshold for chunk deduplication
  # Chunks more similar than this are considered duplicates
  dedup_threshold: 0.85

# ─────────────────────────────────────────────────────────────────────
# Evidence Polarity – Support vs. refutation classification
# ─────────────────────────────────────────────────────────────────────
evidence_polarity:
  # Minimum confidence for 'strong_support' classification
  strong_support_min: 0.75

  # Maximum confidence for 'weak_support' classification
  weak_support_max: 0.55

  # Minimum confidence for 'refute' classification
  refute_min: 0.60

# ─────────────────────────────────────────────────────────────────────
# Retry Logic – Supplemental retrieval and decision gates
# ─────────────────────────────────────────────────────────────────────
retry:
  # Maximum retry attempts for supplemental retrieval
  retry_count_max: 1

  # Force 'accept' decision when retry_count >= this value
  # Prevents infinite retry loops
  force_accept_on_retry: 1

# ─────────────────────────────────────────────────────────────────────
# RPS Feature Weights and Normalization (centralized)
# ─────────────────────────────────────────────────────────────────────
rps:
  weights:
    study_design: 0.35
    sample_size: 0.25
    preregistration: 0.15
    transparency: 0.10
    journal_quality: 0.10
    risk_of_bias: 0.05
    statistical_precision: 0.07
    multicenter: 0.06
    funding_transparency: 0.03
    population_applicability: 0.04
  normalization:
    sample_size_max: 10000
    sample_size_log_base: 10
    sample_size_log_min: 1
    sample_size_log_max: 10000
    clamp_min: 0.0
    clamp_max: 1.0
  transparency_features:
    open_data: true
    open_code: true
    preregistration: true
